<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>CopyTeX KaTeX DOM fixture</title>
  </head>
  <body>
    <p>
      Inline:
      <span class="katex">
        <span class="katex-mathml">
          <math>
            <semantics>
              <mrow></mrow>
              <annotation encoding="application/x-tex">E = mc^2</annotation>
            </semantics>
          </math>
        </span>
        <span class="katex-html" aria-hidden="true">E = mc^2</span>
      </span>
    </p>

    <p>
      Block:
      <span class="katex-display">
        <span class="katex">
          <span class="katex-mathml">
            <math display="block">
              <semantics>
                <mrow></mrow>
                <annotation encoding="application/x-tex">\int_0^1 x\,dx</annotation>
              </semantics>
            </math>
          </span>
          <span class="katex-html" aria-hidden="true">integral</span>
        </span>
      </span>
    </p>
  </body>
</html>
