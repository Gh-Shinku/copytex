<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CopyTeX Settings</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="copytex-popup">
      <header class="copytex-header">
        <h1>CopyTeX</h1>
      </header>

      <section class="copytex-section" aria-labelledby="output-format-label">
        <div class="copytex-section-header">
          <h2 id="output-format-label">Output format</h2>
          <p>Used for selection, hover, and context-menu copies.</p>
        </div>

        <div class="copytex-options" role="radiogroup" aria-labelledby="output-format-label">
          <label class="copytex-option">
            <input type="radio" name="outputFormat" value="markdown">
            <span class="copytex-option-text">Markdown: $ ... $</span>
          </label>
          <label class="copytex-option">
            <input type="radio" name="outputFormat" value="latex">
            <span class="copytex-option-text">LaTeX: \\( ... \\)</span>
          </label>
        </div>
      </section>

      <div id="status" class="copytex-status" role="status" aria-live="polite"></div>
    </main>
    <script src="shared/settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
