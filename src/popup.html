<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CopyTeX Settings</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="copytex-popup">
      <header class="copytex-header">
        <h1>CopyTeX</h1>
      </header>

      <section class="copytex-section" aria-labelledby="display-wrapper-label">
        <div class="copytex-section-header">
          <h2 id="display-wrapper-label">Block formula wrapper</h2>
          <p>Used when copying selected text that contains display math.</p>
        </div>

        <div class="copytex-options" role="radiogroup" aria-labelledby="display-wrapper-label">
          <label class="copytex-option">
            <input type="radio" name="displayDelimiter" value="bracket">
            <span class="copytex-option-text">\\[ ... \\]</span>
          </label>
          <label class="copytex-option">
            <input type="radio" name="displayDelimiter" value="dollar">
            <span class="copytex-option-text">$$ ... $$</span>
          </label>
        </div>
      </section>

      <div id="status" class="copytex-status" role="status" aria-live="polite"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
